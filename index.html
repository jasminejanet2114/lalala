<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bestie 💙</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #001f3f, #003566, #0077b6);
      text-align: center;
      color: #e0f7ff;
      overflow-x: hidden;
    }

    header { padding: 80px 20px; }

    h1 { font-size: 3em; margin-bottom: 20px; }

    p { font-size: 1.3em; margin-bottom: 30px; }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #00b4d8, #90e0ef);
      color: #001f3f;
      cursor: pointer;
      font-weight: bold;
    }

    .message {
      margin-top: 20px;
      font-size: 1.5em;
      display: none;
      min-height: 60px;
    }

    /* Bouquet (heart layout) */
    .bouquet {
      display: none;
      position: relative;
      width: 200px;
      height: 180px;
      margin: 20px auto;
    }

    .flower {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      position: absolute;
      animation: bloom 0.5s ease forwards,
                 glow 2s ease-in-out infinite alternate,
                 sparkle 3s infinite;
      opacity: 0;
      box-shadow: 0 0 6px rgba(0, 180, 216, 0.6),
                  0 0 12px rgba(0, 150, 199, 0.5),
                  0 0 18px rgba(72, 202, 228, 0.4);
    }

    @keyframes bloom {
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 6px rgba(0, 180, 216, 0.6),
                    0 0 12px rgba(0, 150, 199, 0.5),
                    0 0 18px rgba(72, 202, 228, 0.4);
        filter: brightness(1);
      }
      to {
        box-shadow: 0 0 12px rgba(0, 180, 216, 0.9),
                    0 0 20px rgba(0, 150, 199, 0.8),
                    0 0 30px rgba(144, 224, 239, 0.7);
        filter: brightness(1.3);
      }
    }

    @keyframes sparkle {
      0%, 100% {
        transform: scale(1);
        opacity: 0.8;
      }
      20% {
        transform: scale(1.4);
        opacity: 1;
      }
      40% {
        transform: scale(0.9);
        opacity: 0.6;
      }
      60% {
        transform: scale(1.3);
        opacity: 1;
      }
      80% {
        transform: scale(1);
        opacity: 0.7;
      }
    }

    /* Cake */
    .cake {
      margin: 50px auto;
      width: 120px;
      height: 120px;
      position: relative;
    }

    .layer {
      width: 120px;
      height: 40px;
      background: #00b4d8;
      border-radius: 10px;
      position: absolute;
    }

    .layer:nth-child(1) { top: 60px; }
    .layer:nth-child(2) { top: 30px; background: #0077b6; }
    .layer:nth-child(3) { top: 0; background: #023e8a; }

    .candle {
      width: 10px;
      height: 30px;
      background: #caf0f8;
      position: absolute;
      top: -40px;
      left: 55px;
      border-radius: 5px;
      cursor: pointer;
    }

    .flame {
      width: 10px;
      height: 10px;
      background: #ffd166;
      border-radius: 50%;
      position: absolute;
      top: -12px;
      left: 0;
      animation: flicker 0.5s infinite;
    }

    @keyframes flicker {
      50% { transform: scale(1.2); }
    }

    /* Balloons → bubbles */
    .balloon {
      width: 40px;
      height: 50px;
      border-radius: 50%;
      position: absolute;
      bottom: -60px;
      background: radial-gradient(circle, rgba(144,224,239,0.7), rgba(0,119,182,0.3));
      animation: float 6s infinite ease-in;
    }

    @keyframes float {
      to { transform: translateY(-800px); }
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <header>
    <h1>Happy Birthday, <span id="name">Leisha</span> 🎂💙</h1>
    <p>No distance can ever change how much you mean to me.</p>

    <div class="cake">
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="candle" onclick="startMicBlow()">
        <div class="flame" id="flame"></div>
      </div>
    </div>

    <p>Tap the candle and blow it</p>

    <button onclick="showSurprise()">Click for Surprise 🎁</button>

    <div class="bouquet" id="bouquet"></div>

    <div class="message" id="message"></div>

    <audio id="music" src="audio/bestfriend.mp3"></audio>
  </header>

  <footer>Made with 💙 for my best friend</footer>

  <script>
    const customName = "Leisha";
    document.getElementById('name').innerText = customName;

    function heartPoints(n=60) {
      const pts = [];
      for (let i=0;i<n;i++){
        const t = Math.PI*2*i/n;
        const x = 16*Math.pow(Math.sin(t),3);
        const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
        pts.push({x,y});
      }
      return pts;
    }

    function showSurprise() {
      const bouquet = document.getElementById('bouquet');
      bouquet.innerHTML='';
      bouquet.style.display = 'block';

      const pts = heartPoints(80);
      const scale = 4;

      pts.forEach((p, i) => {
        const f = document.createElement('div');
        f.className = 'flower';
        f.style.left = (100 + p.x*scale/2) + 'px';
        f.style.top = (90 + p.y*scale/2) + 'px';

        f.style.background = ['#0077b6','#0096c7','#00b4d8','#48cae4','#90e0ef'][Math.floor(Math.random()*5)];

        f.style.transform = 'scale(0)';
        f.style.animationDelay = (i*0.01)+'s, 0s, ' + (Math.random()*3)+'s';

        bouquet.appendChild(f);
      });

      typeMessage("I miss you so much and I hope your day is as amazing as you are 💙✨");
      document.getElementById('music').play().catch(()=>{});
    }

    function typeMessage(text) {
      const el = document.getElementById('message');
      el.style.display = 'block';
      el.textContent = '';
      let i=0;
      const t = setInterval(()=>{
        el.textContent += text[i++];
        if(i>=text.length) clearInterval(t);
      }, 40);
    }

    async function startMicBlow(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        src.connect(analyser);
        const data = new Uint8Array(analyser.fftSize);

        const check = ()=>{
          analyser.getByteTimeDomainData(data);
          let sum=0;
          for(let i=0;i<data.length;i++){
            const v=(data[i]-128)/128;
            sum+=v*v;
          }
          const rms = Math.sqrt(sum/data.length);

          if(rms > 0.12){
            blowCandle();
            stream.getTracks().forEach(t=>t.stop());
          } else {
            requestAnimationFrame(check);
          }
        };
        check();
      }catch(e){
        blowCandle();
      }
    }

    function blowCandle(){
      const flame = document.getElementById('flame');
      if(flame) flame.style.display = 'none';
      alert('Make a wish 🎂✨');
    }

    function createBalloon() {
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      balloon.style.left = Math.random() * window.innerWidth + 'px';
      balloon.style.animationDuration = (4 + Math.random() * 3) + 's';
      document.body.appendChild(balloon);
      setTimeout(() => balloon.remove(), 7000);
    }

    setInterval(createBalloon, 500);
  </script>

</body>
</html>
