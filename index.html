<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bestie 💙</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #001f3f, #003566, #0077b6);
  text-align: center;
  color: #e0f7ff;
  overflow-x: hidden;
}

header {
  padding: 40px 15px;
}

h1 {
  font-size: 2em;
  margin-bottom: 15px;
}

p {
  font-size: 1em;
  margin-bottom: 20px;
  padding: 0 10px;
}

/* ✅ FIX: push cake down */
.cake {
  margin: 60px auto 30px; /* increased top margin */
  width: 90px;
  height: 90px;
  position: relative;
}

.layer {
  width: 90px;
  height: 30px;
  border-radius: 8px;
  position: absolute;
}

.layer:nth-child(1) { top: 45px; background: #00b4d8; }
.layer:nth-child(2) { top: 20px; background: #0077b6; }
.layer:nth-child(3) { top: 0; background: #023e8a; }

.candle {
  width: 8px;
  height: 25px;
  background: #caf0f8;
  position: absolute;
  top: -30px;
  left: 40px;
  border-radius: 4px;
  cursor: pointer;
}

.flame {
  width: 8px;
  height: 8px;
  background: #ffd166;
  border-radius: 50%;
  position: absolute;
  top: -10px;
  animation: flicker 0.5s infinite;
}

@keyframes flicker {
  50% { transform: scale(1.2); }
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 0.9em;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #00b4d8, #90e0ef);
  color: #001f3f;
  font-weight: bold;
}

.message {
  margin-top: 15px;
  font-size: 1.2em;
  display: none;
  min-height: 50px;
  padding: 0 10px;
}

/* Bouquet */
.bouquet {
  display: none;
  position: relative;
  width: 160px;
  height: 140px;
  margin: 15px auto;
}

.flower {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  position: absolute;
  animation: bloom 0.5s ease forwards,
             glow 2s infinite alternate,
             sparkle 3s infinite;
  opacity: 0;
}

@keyframes bloom {
  to { transform: scale(1); opacity: 1; }
}

@keyframes glow {
  from { filter: brightness(1); }
  to { filter: brightness(1.3); }
}

@keyframes sparkle {
  50% { transform: scale(1.3); }
}

/* Floating bubbles */
.balloon {
  width: 25px;
  height: 30px;
  border-radius: 50%;
  position: absolute;
  bottom: -40px;
  background: radial-gradient(circle, rgba(144,224,239,0.7), rgba(0,119,182,0.3));
  animation: float 6s linear;
}

@keyframes float {
  to { transform: translateY(-700px); }
}

footer {
  margin-top: 30px;
  padding: 15px;
  font-size: 0.8em;
}
</style>
</head>

<body>

<header>
  <h1>Happy Birthday, <span id="name">Leisha</span> 🎂💙</h1>
  <p>No distance can ever change how much you mean to me.</p>

  <!-- Cake -->
  <div class="cake">
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="candle" onclick="startMicBlow()">
      <div class="flame" id="flame"></div>
    </div>
  </div>

  <p>Tap the candle and blow 🎤💨</p>

  <button onclick="showSurprise()">Click for Surprise 🎁</button>

  <div class="bouquet" id="bouquet"></div>
  <div class="message" id="message"></div>

  <audio id="music" src="audio/bestfriend.mp3"></audio>
</header>

<footer>Made with 💙 for my best friend</footer>

<script>
const customName = "Leisha";
document.getElementById('name').innerText = customName;

/* Heart */
function heartPoints(n=60) {
  const pts = [];
  for (let i=0;i<n;i++){
    const t = Math.PI*2*i/n;
    const x = 16*Math.pow(Math.sin(t),3);
    const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    pts.push({x,y});
  }
  return pts;
}

/* Surprise */
function showSurprise() {
  const bouquet = document.getElementById('bouquet');
  bouquet.innerHTML='';
  bouquet.style.display = 'block';

  const pts = heartPoints(60);
  const scale = 3;

  pts.forEach((p, i) => {
    const f = document.createElement('div');
    f.className = 'flower';
    f.style.left = (80 + p.x*scale/2) + 'px';
    f.style.top = (70 + p.y*scale/2) + 'px';

    f.style.background = ['#0077b6','#0096c7','#00b4d8','#48cae4','#90e0ef'][Math.floor(Math.random()*5)];
    f.style.transform = 'scale(0)';
    f.style.animationDelay = (i*0.01)+'s';

    bouquet.appendChild(f);
  });

  typeMessage("I miss you so much and I hope your day is as amazing as you are 💙✨");
  document.getElementById('music').play().catch(()=>{});
}

/* Typing */
function typeMessage(text) {
  const el = document.getElementById('message');
  el.style.display = 'block';
  el.textContent = '';
  let i=0;
  const t = setInterval(()=>{
    el.textContent += text[i++];
    if(i>=text.length) clearInterval(t);
  }, 35);
}

/* 🎤 MIC BLOW (your feature kept) */
async function startMicBlow(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    await ctx.resume();

    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    src.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    const check = ()=>{
      analyser.getByteTimeDomainData(data);

      let sum=0;
      for(let i=0;i<data.length;i++){
        const v=(data[i]-128)/128;
        sum+=v*v;
      }

      const rms = Math.sqrt(sum/data.length);

      if(rms > 0.10){
        blowCandle();
        stream.getTracks().forEach(t=>t.stop());
      } else {
        requestAnimationFrame(check);
      }
    };

    check();
  }catch(e){
    blowCandle();
  }
}

/* Blow */
function blowCandle(){
  const flame = document.getElementById('flame');
  if(flame) flame.style.display = 'none';
  alert('Make a wish 🎂✨');
}

/* Bubbles */
function createBalloon() {
  const balloon = document.createElement('div');
  balloon.className = 'balloon';
  balloon.style.left = Math.random() * window.innerWidth + 'px';
  balloon.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(balloon);
  setTimeout(() => balloon.remove(), 6000);
}

setInterval(createBalloon, 700);
</script>

</body>
</html>
